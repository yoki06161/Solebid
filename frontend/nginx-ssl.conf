# ============================================================================
# Nginx SSL/HTTPS 설정 파일
# ============================================================================
# 이 설정 파일은 HTTPS를 지원하며 HTTP 요청을 HTTPS로 리다이렉트합니다.
# 
# 주요 기능:
#   - HTTP (포트 80) → HTTPS (포트 443) 자동 리다이렉트
#   - TLS 1.2, 1.3 지원
#   - 강력한 암호화 스위트
#   - HSTS (HTTP Strict Transport Security) 헤더
#   - 보안 헤더 설정
#   - HTTP/2 지원
# ============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # 로그 형식 정의
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    # SSL 전용 로그 형식 (프로토콜 및 암호화 정보 포함)
    log_format ssl '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" '
                   'ssl_protocol=$ssl_protocol ssl_cipher=$ssl_cipher';
    
    access_log /var/log/nginx/access.log main;
    
    # 기본 설정
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # 서버 토큰 숨기기 (보안)
    server_tokens off;

    # ========================================================================
    # HTTP 서버 (포트 80) - HTTPS로 리다이렉트
    # ========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # 모든 HTTP 요청을 HTTPS로 301 영구 리다이렉트
        return 301 https://$host$request_uri;
    }

    # ========================================================================
    # HTTPS 서버 (포트 443)
    # ========================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name _;

        root /usr/share/nginx/html;
        index index.html index.htm;

        # ====================================================================
        # SSL 인증서 설정
        # ====================================================================
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # ====================================================================
        # SSL 프로토콜 설정
        # ====================================================================
        # TLS 1.2와 1.3만 사용 (SSLv2, SSLv3, TLS 1.0, TLS 1.1 비활성화)
        ssl_protocols TLSv1.2 TLSv1.3;
        
        # 서버 암호화 스위트 우선 사용
        ssl_prefer_server_ciphers on;
        
        # ====================================================================
        # 강력한 암호화 스위트 설정
        # ====================================================================
        # Modern 암호화 스위트 (약한 알고리즘 제외)
        # - ECDHE: Perfect Forward Secrecy 지원
        # - AES-GCM: 인증된 암호화
        # - CHACHA20-POLY1305: 모바일 최적화
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        
        # ====================================================================
        # SSL 세션 설정 (성능 최적화)
        # ====================================================================
        # SSL 세션 캐시 (10MB = 약 40,000 세션)
        ssl_session_cache shared:SSL:10m;
        
        # SSL 세션 타임아웃 (10분)
        ssl_session_timeout 10m;
        
        # SSL 세션 티켓 활성화 (세션 재사용)
        ssl_session_tickets on;
        
        # ====================================================================
        # OCSP Stapling 설정 (인증서 검증 성능 향상)
        # ====================================================================
        ssl_stapling on;
        ssl_stapling_verify on;
        
        # DNS 리졸버 설정 (Docker 내부 DNS)
        resolver 127.0.0.11 valid=300s;
        resolver_timeout 5s;

        # ====================================================================
        # 보안 헤더 설정
        # ====================================================================
        
        # HSTS (HTTP Strict Transport Security)
        # - 브라우저가 항상 HTTPS만 사용하도록 강제
        # - max-age: 1년 (31536000초)
        # - includeSubDomains: 모든 서브도메인에도 적용
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        
        # X-Frame-Options
        # - 클릭재킹 공격 방지
        # - SAMEORIGIN: 같은 도메인에서만 iframe 허용
        add_header X-Frame-Options "SAMEORIGIN" always;
        
        # X-Content-Type-Options
        # - MIME 타입 스니핑 방지
        # - nosniff: 브라우저가 Content-Type을 무시하지 못하도록 함
        add_header X-Content-Type-Options "nosniff" always;
        
        # X-XSS-Protection
        # - XSS 공격 방지 (레거시 브라우저용)
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Content-Security-Policy
        # - XSS 및 데이터 주입 공격 방지
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self';" always;
        
        # Referrer-Policy
        # - 리퍼러 정보 제어
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Permissions-Policy (구 Feature-Policy)
        # - 브라우저 기능 접근 제어
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ====================================================================
        # Gzip 압축 설정
        # ====================================================================
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_proxied expired no-cache no-store private auth;
        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            application/javascript
            application/xml+rss
            application/json
            application/xml
            application/xhtml+xml
            image/svg+xml;
        gzip_comp_level 6;

        # ====================================================================
        # 정적 파일 캐싱 설정
        # ====================================================================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
            
            # 정적 파일에도 보안 헤더 추가
            add_header X-Content-Type-Options "nosniff" always;
        }

        # ====================================================================
        # API 프록시 설정 (백엔드로 전달)
        # ====================================================================
        location /api/ {
            # 백엔드 서버로 프록시
            proxy_pass http://backend:8080;
            
            # 프록시 헤더 설정
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # HTTPS 프로토콜 정보 전달 (중요!)
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Ssl on;
            
            # 프록시 타임아웃 설정
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # 프록시 버퍼링 설정
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            
            # WebSocket 지원 (필요시)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ====================================================================
        # SSL 헬스 체크 엔드포인트
        # ====================================================================
        location /health/ssl {
            access_log off;
            return 200 "SSL OK\n";
            add_header Content-Type text/plain;
        }

        # ====================================================================
        # SPA 라우팅 설정 (React Router 등)
        # ====================================================================
        location / {
            try_files $uri $uri/ /index.html;
            
            # 보안 헤더 (중복이지만 명시적으로 추가)
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
        }

        # ====================================================================
        # 에러 페이지 설정
        # ====================================================================
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /50x.html {
            root /usr/share/nginx/html;
        }

        # ====================================================================
        # 로그 설정 (SSL 정보 포함)
        # ====================================================================
        access_log /var/log/nginx/access.log ssl;
        error_log /var/log/nginx/error.log warn;
    }
}
