# Docker 환경용 Spring Boot 설정 파일
# 이 파일은 Docker Compose 환경에서 실행될 때 사용됩니다.
# 환경 변수를 통해 민감한 정보와 환경별 설정을 오버라이드할 수 있습니다.

# ===================================
# Redis 설정 (Docker 환경)
# ===================================
# Docker Compose에서 정의된 Redis 서비스명을 호스트로 사용
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=2000ms

# Redis 연결 풀 설정
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=-1ms

# ===================================
# 데이터베이스 설정 (환경 변수 오버라이드 지원)
# ===================================
# AWS RDS 연결 정보 - 환경 변수로 오버라이드 가능
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===================================
# JWT 설정 (환경 변수 오버라이드 지원)
# ===================================
jwt.secret=${JWT_SECRET}
jwt.access-token-validity-seconds=${JWT_ACCESS_TOKEN_VALIDITY:3600}
jwt.refresh-token-validity-seconds=${JWT_REFRESH_TOKEN_VALIDITY:86400}

# ===================================
# AWS 설정 (환경 변수 오버라이드 지원)
# ===================================
cloud.aws.region.static=${AWS_REGION:ap-southeast-2}
spring.cloud.aws.region.static=${AWS_REGION:ap-southeast-2}
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
cloud.aws.s3.bucket=${S3_BUCKET}
app.s3.bucket=${S3_BUCKET}

# ===================================
# 이메일 설정 (환경 변수 오버라이드 지원)
# ===================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.auth.mechanisms=XOAUTH2
spring.mail.properties.mail.smtp.auth.login.disable=true
spring.mail.properties.mail.smtp.auth.plain.disable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.debug=${MAIL_DEBUG:false}

# Gmail OAuth2 설정
google.mail.oauth2.enabled=true
google.mail.refresh-token=${GOOGLE_MAIL_REFRESH_TOKEN}

# ===================================
# OAuth2 클라이언트 설정 (환경 변수 오버라이드 지원)
# ===================================
# Google OAuth2 설정 - Docker 환경에서는 프론트엔드가 포트 3000에서 실행됨
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

# Kakao OAuth2 설정 - Docker 환경에서는 프론트엔드가 포트 3000에서 실행됨
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET}
spring.security.oauth2.client.registration.kakao.redirect-uri=${KAKAO_REDIRECT_URI}
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email

# Kakao OAuth2 Provider 설정
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# Kakao API 설정
kakao.api-host=${KAKAO_API_HOST}
kakao.admin-key=${KAKAO_ADMIN_KEY}

# ===================================
# PortOne 결제 설정 (환경 변수 오버라이드 지원)
# ===================================
portone.base-url=${PORTONE_BASE_URL}
portone.api-key=${PORTONE_API_KEY}
portone.api-secret=${PORTONE_API_SECRET}

# ===================================
# 프론트엔드 설정 (Docker 환경)
# ===================================
# Docker 환경에서는 프론트엔드가 포트 3000에서 실행됨
app.frontend.base-url=${FRONTEND_BASE_URL}

# ===================================
# 로깅 설정 (Docker 환경)
# ===================================
# Docker 환경에서는 보안 관련 로깅을 최소화
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:info}
logging.level.com.solebid=${APP_LOG_LEVEL:info}

# ===================================
# 서버 설정 (Docker 환경)
# ===================================
# Docker 컨테이너 내부에서 모든 인터페이스에서 접근 허용
server.address=0.0.0.0
server.port=${SERVER_PORT:8080}

# HTTPS 프록시 설정 (Nginx 리버스 프록시 사용 시)
# Nginx에서 전달하는 X-Forwarded-* 헤더 신뢰
server.forward-headers-strategy=native
server.tomcat.remoteip.protocol-header=X-Forwarded-Proto
server.tomcat.remoteip.remote-ip-header=X-Forwarded-For

# 세션 쿠키 설정 (HTTPS 환경 대응)
# 개발 환경에서는 HTTP도 허용하므로 secure=false
# 프로덕션에서는 application-prod.properties에서 secure=true로 오버라이드
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# ===================================
# 액추에이터 설정 (헬스체크용)
# ===================================
# Docker 헬스체크를 위한 액추에이터 엔드포인트 활성화
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.redis.enabled=true
management.endpoints.web.base-path=/actuator
management.security.enabled=false