# 프로덕션 환경용 Spring Boot 설정 파일
# 이 파일은 프로덕션 환경에서 실행될 때 사용됩니다.
# 모든 민감한 정보는 환경 변수를 통해 주입됩니다.

# ===================================
# 데이터베이스 설정 (프로덕션)
# ===================================
# AWS RDS 연결 정보 - 반드시 환경 변수로 설정
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# 프로덕션 환경에서는 SSL 사용 권장
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000

# JPA 설정 (프로덕션 최적화)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# ===================================
# Redis 설정 (프로덕션)
# ===================================
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=3000ms

# Redis 연결 풀 설정 (프로덕션 최적화)
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-wait=3000ms

# ===================================
# JWT 설정 (프로덕션 보안 강화)
# ===================================
jwt.secret=${JWT_SECRET}
jwt.access-token-validity-seconds=${JWT_ACCESS_TOKEN_VALIDITY:1800}
jwt.refresh-token-validity-seconds=${JWT_REFRESH_TOKEN_VALIDITY:604800}

# ===================================
# AWS 설정 (프로덕션)
# ===================================
cloud.aws.region.static=${AWS_REGION:ap-southeast-2}
spring.cloud.aws.region.static=${AWS_REGION:ap-southeast-2}
spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
cloud.aws.s3.bucket=${S3_BUCKET}
app.s3.bucket=${S3_BUCKET}

# ===================================
# 이메일 설정 (프로덕션)
# ===================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.auth.mechanisms=XOAUTH2
spring.mail.properties.mail.smtp.auth.login.disable=true
spring.mail.properties.mail.smtp.auth.plain.disable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.smtp.debug=${MAIL_DEBUG:false}

# Gmail OAuth2 설정
google.mail.oauth2.enabled=true
google.mail.refresh-token=${GOOGLE_MAIL_REFRESH_TOKEN}

# ===================================
# OAuth2 클라이언트 설정 (프로덕션)
# ===================================
# Google OAuth2 설정 (프로덕션 도메인)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI}
spring.security.oauth2.client.registration.google.scope=profile,email

# Kakao OAuth2 설정 (프로덕션 도메인)
spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET}
spring.security.oauth2.client.registration.kakao.redirect-uri=${KAKAO_REDIRECT_URI}
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email

# Kakao OAuth2 Provider 설정
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# Kakao API 설정
kakao.api-host=${KAKAO_API_HOST:https://kapi.kakao.com}
kakao.admin-key=${KAKAO_ADMIN_KEY}

# ===================================
# PortOne 결제 설정 (프로덕션)
# ===================================
portone.base-url=${PORTONE_BASE_URL:https://api.iamport.kr}
portone.api-key=${PORTONE_API_KEY}
portone.api-secret=${PORTONE_API_SECRET}

# ===================================
# 프론트엔드 설정 (프로덕션)
# ===================================
app.frontend.base-url=${FRONTEND_BASE_URL}

# ===================================
# 서버 설정 (프로덕션)
# ===================================
server.address=0.0.0.0
server.port=${SERVER_PORT:8080}

# 프로덕션 환경에서는 압축 활성화
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# ===================================
# 로깅 설정 (프로덕션)
# ===================================
# 프로덕션에서는 로깅 레벨을 적절히 조정
logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:warn}
logging.level.com.solebid=${APP_LOG_LEVEL:info}
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=warn

# 로그 파일 설정
logging.file.name=/var/log/solebid/application.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===================================
# 액추에이터 설정 (프로덕션 보안)
# ===================================
# 프로덕션에서는 헬스체크만 노출
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.redis.enabled=true
management.health.db.enabled=true

# 액추에이터 포트 분리 (보안 강화)
management.server.port=8081
management.server.address=127.0.0.1

# ===================================
# 보안 설정 (프로덕션)
# ===================================
# HTTPS 강제 (리버스 프록시 사용 시)
# Nginx에서 전달하는 X-Forwarded-* 헤더 신뢰
server.forward-headers-strategy=native

# 프록시 뒤에서 실행 시 원본 프로토콜 인식
server.tomcat.remoteip.protocol-header=X-Forwarded-Proto
server.tomcat.remoteip.remote-ip-header=X-Forwarded-For

# 세션 설정 (HTTPS 환경)
server.servlet.session.timeout=30m
# Secure 쿠키: HTTPS에서만 전송
server.servlet.session.cookie.secure=true
# HttpOnly: JavaScript에서 접근 불가 (XSS 방지)
server.servlet.session.cookie.http-only=true
# SameSite: CSRF 공격 방지
server.servlet.session.cookie.same-site=strict

# ===================================
# 캐시 설정 (프로덕션 최적화)
# ===================================
spring.cache.type=redis
spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# ===================================
# 스레드 풀 설정 (프로덕션 최적화)
# ===================================
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.max-connections=8192
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20000

# ===================================
# JVM 메모리 설정 (환경 변수로 설정)
# ===================================
# JAVA_OPTS 환경 변수를 통해 설정:
# -Xms512m -Xmx2g -XX:+UseG1GC -XX:MaxGCPauseMillis=200
# -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp