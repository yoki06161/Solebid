# Test configuration - H2 in-memory (overridable via DynamicPropertySource in tests)

# Datasource (defaults for tests; specific tests may override via DynamicPropertySource)
spring.datasource.url=jdbc:h2:mem:solebid_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA & Hibernate for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# OAuth2 test configuration
spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code

spring.security.oauth2.client.registration.kakao.client-id=test-kakao-client-id
spring.security.oauth2.client.registration.kakao.client-secret=test-kakao-client-secret
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email
spring.security.oauth2.client.registration.kakao.redirect-uri=http://localhost:8080/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v2/userinfo

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

# JWT test configuration
jwt.secret=test-secret-key-for-testing-purposes-only-test-secret-key-for-testing-1234567890
jwt.access-token-validity-seconds=3600
jwt.refresh-token-validity-seconds=86400

# AWS S3 dummy config for tests
cloud.aws.s3.bucket=local-test-bucket

# PortOne dummy config for tests
portone.base-url=http://localhost:18080
portone.api-key=test-api-key
portone.api-secret=test-api-secret

# Mail configuration for tests (dummy values)
spring.mail.host=localhost
spring.mail.port=587
spring.mail.username=test@example.com
spring.mail.password=test-password
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Redis configuration for tests (embedded)
spring.redis.host=localhost
spring.redis.port=6370
spring.redis.timeout=2000ms

# AWS configuration for tests
cloud.aws.region.static=us-east-1
cloud.aws.credentials.access-key=test-access-key
cloud.aws.credentials.secret-key=test-secret-key

# Frontend URL for tests
app.frontend.base-url=http://localhost:3000

# Logging
logging.level.com.sesac.solbid=INFO
logging.level.org.springframework.security=INFO
