# 개발용 Docker Compose - MySQL과 Redis만 실행
# IntelliJ에서 Spring Boot를 직접 실행할 때 사용

services:
  mysql:
    image: mysql:8.0
    container_name: solebid-mysql-dev
    ports:
      - "${DOCKER_MYSQL_PORT:-3307}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-solebid}
      - MYSQL_USER=${MYSQL_USER:-solebid}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-solebidpassword}
    volumes:
      - mysql-dev-data:/var/lib/mysql
      - ./scripts/mysql-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD:-rootpassword} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: solebid-redis-dev
    ports:
      - "${DOCKER_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-dev-data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mysql-dev-data:
    driver: local
    name: solebid-mysql-dev-data
  redis-dev-data:
    driver: local
    name: solebid-redis-dev-data