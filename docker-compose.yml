# Solebid 프로젝트 Docker Compose 메인 설정 파일
# 백엔드(Spring Boot), 프론트엔드(React), Redis 서비스를 통합 관리

services:
  backend:
    build:
      context: ./backend/demo
      dockerfile: Dockerfile
    container_name: solebid-backend
    ports:
      - "${DOCKER_BACKEND_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-docker,redis}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TOKEN_VALIDITY=${JWT_ACCESS_TOKEN_VALIDITY:-3600}
      - JWT_REFRESH_TOKEN_VALIDITY=${JWT_REFRESH_TOKEN_VALIDITY:-86400}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - AWS_REGION=${AWS_REGION:-ap-southeast-2}
      - S3_BUCKET=${S3_BUCKET}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_DEBUG=${MAIL_DEBUG:-false}
      - GOOGLE_MAIL_REFRESH_TOKEN=${GOOGLE_MAIL_REFRESH_TOKEN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:3000/auth/callback/google}
      - KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}
      - KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}
      - KAKAO_REDIRECT_URI=${KAKAO_REDIRECT_URI:-http://localhost:3000/auth/callback/kakao}
      - KAKAO_API_HOST=${KAKAO_API_HOST:-https://kapi.kakao.com}
      - KAKAO_ADMIN_KEY=${KAKAO_ADMIN_KEY}
      - PORTONE_BASE_URL=${PORTONE_BASE_URL:-https://api.iamport.kr}
      - PORTONE_API_KEY=${PORTONE_API_KEY}
      - PORTONE_API_SECRET=${PORTONE_API_SECRET}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost:3000}
      - SERVER_PORT=${SERVER_PORT:-8080}
      - SECURITY_LOG_LEVEL=${SECURITY_LOG_LEVEL:-info}
      - APP_LOG_LEVEL=${APP_LOG_LEVEL:-info}
      - JPA_SHOW_SQL=${JPA_SHOW_SQL:-false}
      - JPA_FORMAT_SQL=${JPA_FORMAT_SQL:-false}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - solebid-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/products || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: solebid-frontend
    ports:
      - "${DOCKER_FRONTEND_PORT:-3000}:80"      # HTTP 포트 (HTTPS로 리다이렉트)
      - "${DOCKER_FRONTEND_HTTPS_PORT:-3443}:443"  # HTTPS 포트
    volumes:
      # SSL 인증서 마운트 (읽기 전용)
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # SSL 지원 Nginx 설정 파일 마운트 (선택사항)
      # 기본 nginx.conf 대신 nginx-ssl.conf 사용하려면 아래 주석 해제
      # - ./frontend/nginx-ssl.conf:/etc/nginx/nginx.conf:ro
    environment:
      # HTTPS 활성화 플래그
      - NGINX_SSL_ENABLED=${NGINX_SSL_ENABLED:-false}
    depends_on:
      backend:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - solebid-network
    restart: unless-stopped
    healthcheck:
      # HTTPS가 활성화된 경우 HTTPS 엔드포인트 체크
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || curl -k -f https://localhost:443/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mysql:
    image: mysql:8.0
    container_name: solebid-mysql
    ports:
      - "${DOCKER_MYSQL_PORT:-3306}:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-solebid}
      - MYSQL_USER=${MYSQL_USER:-solebid}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-solebidpassword}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/mysql-init:/docker-entrypoint-initdb.d
    networks:
      - solebid-network
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD:-rootpassword} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: solebid-redis
    ports:
      - "${DOCKER_REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - solebid-network
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  solebid-network:
    driver: bridge
    name: solebid-network

volumes:
  mysql-data:
    driver: local
    name: solebid-mysql-data
  redis-data:
    driver: local
    name: solebid-redis-data